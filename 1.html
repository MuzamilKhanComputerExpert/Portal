<!DOCTYPE html>
<html>
<head>
<title>Student Result Portal</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}
.container{
width:400px;
margin:auto;
background:white;
padding:20px;
margin-top:50px;
border-radius:10px;
box-shadow:0 0 10px gray;
}
input{
width:90%;
padding:10px;
margin:10px;
}
button{
padding:10px 20px;
background:green;
color:white;
border:none;
cursor:pointer;
}
#result{
margin-top:20px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h2>Student Result Portal</h2>

<input type="text" id="rollno" placeholder="Enter Roll Number">

<button onclick="checkResult()">Check Result</button>

<div id="result"></div>
</div>

<script>
function checkResult(){

var roll=document.getElementById("rollno").value;

if(roll=="101"){
document.getElementById("result").innerHTML=
"Name: Ali Khan <br> Father: Ahmad Khan <br> Marks: 950/1100";
}
else if(roll=="102"){
document.getElementById("result").innerHTML=
"Name: Ahmed <br> Father: Karim <br> Marks: 870/1100";
}
else{
document.getElementById("result").innerHTML=
"Result Not Found";
}
}
</script>

</body>
</html>
